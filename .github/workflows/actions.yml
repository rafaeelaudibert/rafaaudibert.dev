name: Deploy Website
on:
  push:
    branches:
      - master
jobs:
  deploy-website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Check travel image metadata
        run: bun run check-metadata
      - name: Check travel image descriptions
        run: bun run check-descriptions
      - name: Build website
        run: bun run build
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_API_HOST: ${{ secrets.POSTHOG_API_HOST }}
          AMAZON_SORTING_TABLE_API_URL: ${{ secrets.AMAZON_SORTING_TABLE_API_URL }}
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY_ID }}
          aws-region: us-east-1
      - name: Deploy static website to S3 bucket
        run: |
          aws s3 sync ./dist s3://rafaaudibert-website --delete \
            --cache-control "public, max-age=0, must-revalidate"
          if [ -d ./dist/_astro ]; then
            aws s3 cp ./dist/_astro s3://rafaaudibert-website/_astro \
              --recursive \
              --cache-control "public, max-age=31536000, immutable"
          fi
      - name: Invalidate CloudFront cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text)
          echo "Invalidation created: $INVALIDATION_ID"
          echo "Waiting for CloudFront invalidation to complete..."
          aws cloudfront wait invalidation-completed \
            --distribution-id "$DISTRIBUTION_ID" \
            --id "$INVALIDATION_ID"
          echo "CloudFront invalidation completed."
        env:
          DISTRIBUTION_ID: ${{ secrets.DISTRIBUTION }}
